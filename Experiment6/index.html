<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Manipulation Lab</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="container">

        <h1 id="mainHeading">Welcome to JavaScript Lab</h1>

        <p id="paragraph">
            Learn how JavaScript can dynamically modify webpage content,
            styles, and behavior using DOM Manipulation and Events.
        </p>

        <input
            type="text"
            id="userInput"
            placeholder="Enter a new heading"
        >

        <div class="button-group">

            <button id="changeTextBtn">
                Change Heading
            </button>

            <button id="bgColorBtn">
                Change Background
            </button>

            <button id="fontSizeBtn">
                Increase Font
            </button>

            <button id="toggleBtn">
                Show / Hide Text
            </button>

            <button id="addMessageBtn">
                Add Message
            </button>

            <button id="resetBtn">
                Reset
            </button>

        </div>

        <div id="messageBox"></div>

    </div>

    <script src="main.js"></script>

</body>
</html>
